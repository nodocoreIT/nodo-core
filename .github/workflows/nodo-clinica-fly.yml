name: Deploy nodo-clinica to Fly.io

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "future_nodes/nodo-clinica/**"
      - ".github/workflows/nodo-clinica-fly.yml"

jobs:
  deploy:
    name: Deploy nodo-clinica
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: future_nodes/nodo-clinica
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        run: flyctl deploy --remote-only -a nodo-clinica
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
