<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nodo Obra - Ingreso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/nodo_theme.css">
    <style>
        body {
            background: linear-gradient(135deg, #121e2f 0%, #233650 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 22px;
            box-shadow: 0 24px 60px rgba(18, 30, 47, 0.2);
            width: 100%;
            max-width: 420px;
        }
        .login-card h4 {
            font-family: var(--font-display);
            color: var(--color-navy);
        }
        .brand-accent { color: var(--color-brand); }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h4 class="fw-bold mb-1">nodo <span class="brand-accent">obra</span></h4>
        <p class="text-muted small mb-4">Dirección de Obras</p>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3 text-start">
                <label class="form-label small fw-bold text-muted text-uppercase">Usuario</label>
                <input type="text" name="username" class="form-control form-control-lg" placeholder="Tu usuario" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label small fw-bold text-muted text-uppercase">Contraseña</label>
                <input type="password" name="password" class="form-control form-control-lg" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-nodo-primary w-100">Ingresar</button>
        </form>
        <p class="text-muted mt-4 mb-0" style="font-size: 0.75rem;">
            Clientes: usá el usuario que te dio la inmobiliaria para ver avances en <strong>/mi-cuenta/</strong>
        </p>
    </div>
</body>
</html>
