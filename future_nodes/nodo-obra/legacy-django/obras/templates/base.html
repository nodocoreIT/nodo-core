{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nodo Obra | Dirección de Obras</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'nodo_theme.css' %}">
</head>
<body>
    <nav class="navbar navbar-dark navbar-custom">
        <div class="container-fluid d-flex align-items-center">
            <a class="navbar-brand d-flex align-items-center text-white text-decoration-none" href="{% url 'dashboard_obras' %}">
                <i class="fa-solid fa-hard-hat me-2" style="color: var(--color-brand);"></i>
                <span class="fw-bold">nodo <span class="brand-accent">obra</span></span>
            </a>
            <div class="d-flex align-items-center gap-2">
                {% if user.is_staff %}
                <a href="{% url 'admin:index' %}" class="btn-admin">Panel Admin</a>
                {% endif %}
                <form action="{% url 'logout' %}" method="post" class="m-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-sm btn-nodo-primary">Salir</button>
                </form>
            </div>
        </div>
    </nav>
    <div class="container-fluid mt-4">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
