name: Deploy to Fly.io

# Vercel despliega solo en cada push. Fly.io queda manual para evitar fallos
# si no está configurado FLY_API_TOKEN en GitHub → Settings → Secrets.
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy nodo-clinica
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        run: flyctl deploy --remote-only -a nodo-clinica
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
