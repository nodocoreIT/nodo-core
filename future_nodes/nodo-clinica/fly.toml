# fly.toml app configuration file generated for nodo-clinica on 2026-06-11T18:15:33Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nodo-clinica'
primary_region = 'gru'

[build]

[env]
  CLINIC_DATA_DIR = '/data'
  CLINIC_MODE = 'local'
  NEXT_PUBLIC_CLINIC_MODE = 'local'

[[mounts]]
  source = 'clinica_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
