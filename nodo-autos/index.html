<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/autos/favicon.png" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" href="/autos/favicon-dark.png" media="(prefers-color-scheme: dark)" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nodo | Autos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body { background: #121e2f; margin: 0; }
    </style>
    <script>
      // Login lives on landing — redirect before React boots to avoid a flash of this SPA.
      (function () {
        var path = window.location.pathname;
        if (path === "/autos/login" || path.endsWith("/autos/login")) {
          window.location.replace("/nodo-autos/login");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
