<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/finanzas/favicon.png" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" href="/finanzas/favicon-dark.png" media="(prefers-color-scheme: dark)" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nodo | Finanzas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          if (sessionStorage.getItem("nodo-finanzas-skip-splash") === "1") {
            document.documentElement.classList.add("nodo-skip-splash");
          }
        } catch (_) {}
      })();
    </script>
    <style>
      :root {
        --finanzas-navy: #121e2f;
        --finanzas-brand: #43936c;
        --finanzas-brand-rgb: 67, 147, 108;
      }
      html.nodo-skip-splash #nodo-splash {
        display: none !important;
      }
      body { background: var(--finanzas-navy); margin: 0; }
      #nodo-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: var(--finanzas-navy);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        transition: opacity 0.3s ease;
      }
      #nodo-splash-glow {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(55% 55% at 50% 52%, rgba(var(--finanzas-brand-rgb), .22), transparent 70%);
      }
      #nodo-splash-content {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .nodo-icon-wrap {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 84px;
        height: 84px;
      }
      .nodo-ring {
        position: absolute;
        border-radius: 50%;
      }
      .nodo-ring-1 {
        width: 128px; height: 128px;
        background: rgba(var(--finanzas-brand-rgb), .12);
        animation: nodo-ping 1.5s cubic-bezier(0,0,.2,1) infinite;
      }
      .nodo-ring-2 {
        width: 100px; height: 100px;
        background: rgba(var(--finanzas-brand-rgb), .08);
        animation: nodo-ping 1.5s cubic-bezier(0,0,.2,1) 0.3s infinite;
      }
      .nodo-icon-inner {
        position: relative;
        width: 84px; height: 84px;
        border-radius: 50%;
        background: rgba(var(--finanzas-brand-rgb), .15);
        border: 1.5px solid rgba(var(--finanzas-brand-rgb), .35);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #nodo-splash-label {
        margin-top: 40px;
        font-family: system-ui, sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: .2em;
        text-transform: uppercase;
        color: rgba(234, 240, 247, .4);
      }
      #nodo-splash-title {
        margin-top: 8px;
        font-family: 'Sora', system-ui, sans-serif;
        font-weight: 800;
        font-size: clamp(28px, 5vw, 52px);
        line-height: 1.06;
        color: #fff;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.35em;
        flex-wrap: wrap;
      }
      #nodo-splash-title .nodo-logo {
        height: clamp(28px, 0.78em, 44px);
        width: auto;
        min-width: 72px;
        display: inline-block;
        object-fit: contain;
      }
      #nodo-splash-title .nodo-sep {
        font-weight: 400;
        color: #fff;
      }
      .nodo-dots {
        margin-top: 32px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .nodo-dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--finanzas-brand);
        opacity: 0.3;
      }
      .nodo-dot:nth-child(1) { animation: nodo-bounce 1.2s ease-in-out 0s infinite; }
      .nodo-dot:nth-child(2) { animation: nodo-bounce 1.2s ease-in-out 0.2s infinite; }
      .nodo-dot:nth-child(3) { animation: nodo-bounce 1.2s ease-in-out 0.4s infinite; }
      #nodo-splash-bar-track {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        height: 3px;
        background: rgba(255,255,255,.07);
      }
      #nodo-splash-bar {
        height: 100%;
        background: var(--finanzas-brand);
        width: 0;
        animation: nodo-progress 3s ease-out forwards;
      }
      @keyframes nodo-ping {
        75%, to { transform: scale(1.7); opacity: 0; }
      }
      @keyframes nodo-bounce {
        0%, 80%, 100% { transform: translateY(0); opacity: .3; }
        40%           { transform: translateY(-6px); opacity: 1; }
      }
      @keyframes nodo-progress {
        from { width: 0 }
        to   { width: 100% }
      }
    </style>
  </head>
  <body>
    <div id="nodo-splash">
      <div id="nodo-splash-glow"></div>
      <div id="nodo-splash-content">
        <div class="nodo-icon-wrap">
          <div class="nodo-ring nodo-ring-1"></div>
          <div class="nodo-ring nodo-ring-2"></div>
          <div class="nodo-icon-inner">
            <svg xmlns="http://www.w3.org/2000/svg" width="38" height="38" viewBox="0 0 24 24"
              fill="none" stroke="#43936c" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="1" x2="12" y2="23"/>
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
          </div>
        </div>
        <p id="nodo-splash-label">Entrando a</p>
        <h2 id="nodo-splash-title">
          <img
            class="nodo-logo"
            src="/logos/nodo%20ver.png"
            alt=""
            onerror="this.onerror=null;this.src='%BASE_URL%/logos/nodo-ver.png'"
          />
          <span class="nodo-sep">|</span>
          <span>Finanzas</span>
        </h2>
        <div class="nodo-dots">
          <div class="nodo-dot"></div>
          <div class="nodo-dot"></div>
          <div class="nodo-dot"></div>
        </div>
      </div>
      <div id="nodo-splash-bar-track">
        <div id="nodo-splash-bar"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
